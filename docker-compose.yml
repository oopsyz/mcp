services:
  tmf620-mcp:
    build: .
    ports:
      - "7701:7701" # MCP server
      - "8801:8801" # Mock API
    environment:
      - TMF620_API_URL=http://localhost:8801/tmf-api/productCatalogManagement/v5
      - MCP_PORT=7701
      - MCP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7701/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    depends_on:
      tmf620-mcp:
        condition: service_healthy
    ports:
      - "4096:4096"
    environment:
      - TMF_MCP_URL=http://tmf620-mcp:7701/mcp
      - MODEL=${MODEL:-opencode/minimax-m2.5-free}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-zai-coding-plan}
      - API_KEY=${API_KEY:-}
