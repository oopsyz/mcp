version: '3.8'

services:
  tmf620-mcp:
    build: .
    ports:
      - "7701:7701" # MCP server
      - "8801:8801" # Mock API
    environment:
      - TMF620_API_URL=http://localhost:8801/tmf-api/productCatalogManagement/v5
      - MCP_PORT=7701
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7701/health"]
      interval: 30s
      timeout: 10s
      retries: 3
