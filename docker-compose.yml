services:
  tmf620-mcp:
    build: .
    ports:
      - "7701:7701" # MCP server
      - "8801:8801" # Mock API
    environment:
      - TMF620_API_URL=http://localhost:8801/tmf-api/productCatalogManagement/v5
      - MCP_PORT=7701
      - MCP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7701/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  registry:
    build: .
    command: ["uv", "run", "registry-server"]
    ports:
      - "7700:7700"
    environment:
      - OPENCODE_URL=http://127.0.0.1:4096
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
