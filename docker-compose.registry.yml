services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    env_file:
      - .env.opencode
    volumes:
      - ./registry_agent/data:/home/op/project/registry_agent/data
    ports:
      - "4096:4096"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:4096/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  registry:
    build: .
    command: ["uv", "run", "registry-server"]
    depends_on:
      opencode:
        condition: service_healthy
    environment:
      OPENCODE_URL: http://opencode:4096
      OPENCODE_AGENT: service-registry
    volumes:
      - ./registry_agent/data:/app/registry_agent/data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
